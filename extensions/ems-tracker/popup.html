<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS Pro Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 320px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0a0a12;
            color: #e4e4f0;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .header h1 {
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header .logo {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #007aff, #5856d6);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .status-section {
            padding: 16px;
        }

        .status-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        .status-indicator.online {
            background: rgba(52,199,89,0.12);
            color: #34c759;
            border: 1px solid rgba(52,199,89,0.2);
        }

        .status-indicator.offline {
            background: rgba(142,142,147,0.12);
            color: #8e8e93;
            border: 1px solid rgba(142,142,147,0.2);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .dot.green { background: #34c759; }
        .dot.gray { background: #8e8e93; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .current-activity {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .current-activity .label {
            font-size: 10px;
            font-weight: 600;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
        }

        .current-activity .value {
            font-size: 13px;
            font-weight: 500;
            color: #e4e4f0;
            word-break: break-all;
        }

        .domain-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 6px;
        }

        .domain-badge.PRODUCTIVITY { background: rgba(52,199,89,0.1); color: #34c759; }
        .domain-badge.COMMUNICATION { background: rgba(0,122,255,0.1); color: #007aff; }
        .domain-badge.DESIGN { background: rgba(175,82,222,0.1); color: #af52de; }
        .domain-badge.RESEARCH { background: rgba(88,86,214,0.1); color: #5856d6; }
        .domain-badge.ENTERTAINMENT { background: rgba(255,149,0,0.1); color: #ff9500; }
        .domain-badge.SOCIAL_MEDIA { background: rgba(255,59,48,0.1); color: #ff3b30; }
        .domain-badge.OTHER { background: rgba(142,142,147,0.1); color: #8e8e93; }

        .info-text {
            font-size: 12px;
            color: #8e8e93;
            text-align: center;
            padding: 8px 16px 16px;
        }

        .info-text a {
            color: #007aff;
            text-decoration: none;
        }

        .refresh-btn {
            display: block;
            width: calc(100% - 32px);
            margin: 0 16px 16px;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            background: rgba(0,122,255,0.08);
            color: #007aff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .refresh-btn:hover {
            background: rgba(0,122,255,0.15);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            <span class="logo">⏱</span>
            EMS Pro Tracker
        </h1>
    </div>

    <div class="status-section">
        <div class="status-card">
            <div id="status-badge" class="status-indicator offline">
                <span class="dot gray"></span>
                Offline
            </div>

            <div class="current-activity" id="activity-section" style="display:none;">
                <div class="label">Currently Viewing</div>
                <div class="value" id="current-domain">—</div>
                <div id="category-badge"></div>
            </div>
        </div>
    </div>

    <button class="refresh-btn" id="refresh">↻ Refresh Status</button>

    <p class="info-text">
        Tracking starts automatically when you check in on
        <a href="http://localhost:3000" target="_blank">EMS Pro</a>.
    </p>

    <script src="popup.js"></script>
</body>
</html>
