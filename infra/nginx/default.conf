# HiringNow Platform — API Gateway (Nginx)
# Routes traffic between platform services and the HRMS microservice.
#
# Service topology:
#   hn-django:8000    — HiringNow Platform backend
#   hn-next:3000      — HiringNow Platform frontend
#   hrms-django:8001  — HRMS (Employee Directory) backend
#   hrms-next:3001    — HRMS (Employee Directory) frontend

upstream hrms_django { server hrms-django:8001; }
upstream hrms_next   { server hrms-next:3001; }
upstream hn_django   { server hn-django:8000; }
upstream hn_next     { server hn-next:3000; }

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # Common proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- HRMS API: /api/v1/hrms/* → hrms-django (strip prefix) ---
    location /api/v1/hrms/ {
        rewrite ^/api/v1/hrms/(.*)$ /api/v1/$1 break;
        proxy_pass http://hrms_django;
        proxy_read_timeout 120s;
    }

    # --- HRMS Frontend: /hrms/* → hrms-next (Multi-Zone) ---
    location /hrms/ {
        proxy_pass http://hrms_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # HRMS static assets
    location /hrms/_next/ {
        proxy_pass http://hrms_next;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, immutable, max-age=2592000";
    }

    # --- HiringNow API: /api/v1/* → hn-django (default) ---
    location /api/v1/ {
        proxy_pass http://hn_django;
        proxy_read_timeout 120s;
    }

    # --- HiringNow Frontend: /* → hn-next (default) ---
    location / {
        proxy_pass http://hn_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # HiringNow static assets
    location /_next/ {
        proxy_pass http://hn_next;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, immutable, max-age=2592000";
    }
}
